<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotion Classification</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .container {
            margin-top: 50px;
            max-width: 700px;
        }

        h1 {
            color: #007bff;
            text-align: center;
            margin-bottom: 30px;
        }

        .form-control {
            background-color: #ffffff;
        }

        .btn-primary {
            background-color: #007bff;
            border-color: #007bff;
        }

        .btn-primary:hover {
            background-color: #0069d9;
            border-color: #0062cc;
        }

        .result-box {
            margin-top: 25px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Emotion Classification</h1>

        <form method="POST" action="{{ url_for('analyze_emotion') }}">
            <div class="form-group">
                <label for="comment">Enter your comment:</label>
                <textarea class="form-control" id="comment" name="comment" rows="4" placeholder="Type your text here..." required></textarea>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Analyze</button>
        </form>

        {% if sentiment %}
        <div class="result-box">
            <div class="alert alert-success" role="alert">
                <strong>Predicted Emotion:</strong> {{ sentiment }}
            </div>
        </div>
        {% endif %}
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
